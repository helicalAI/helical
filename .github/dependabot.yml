version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Wait 7 days before proposing updates to newly published versions so
    # freshly released (possibly malicious or unstable) packages have time to
    # be vetted. Security updates are not affected by cooldown.
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Weekly Docker base-image patch PRs — SOC 2 patch management (helicalAI/dashboard#1147).
  # Base images are digest-pinned in the Dockerfiles, so Dependabot proposes updated
  # digests (OS security patches) on the same tag — a reviewable, timestamped audit trail.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
